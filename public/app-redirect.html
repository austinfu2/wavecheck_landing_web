<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveCheck — Surf Forecasts</title>

    <!-- Open Graph for social sharing previews -->
    <meta property="og:title" content="WaveCheck — Surf Forecasts" />
    <meta property="og:description" content="Real-time surf conditions, personalized forecasts, and session tracking for 1,000+ spots across Europe." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wavecheck.surf" />
    <meta property="og:image" content="https://wavecheck.surf/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WaveCheck — Surf Forecasts" />
    <meta name="twitter:description" content="Real-time surf conditions, personalized forecasts, and session tracking." />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #203645;
            color: #FAF8EA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 400px;
        }

        .logo {
            font-family: 'Georgia', serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 16px;
            opacity: 0.6;
            margin-bottom: 40px;
        }

        .wave-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .message {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .sub-message {
            font-size: 14px;
            opacity: 0.5;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 220px;
            padding: 14px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .store-btn:active { transform: scale(0.97); }

        .store-btn-apple {
            background: #FAF8EA;
            color: #203645;
        }

        .store-btn-google {
            background: transparent;
            color: #FAF8EA;
            border: 1.5px solid rgba(250, 248, 234, 0.25);
        }

        .store-btn svg { width: 22px; height: 22px; }

        .footer {
            margin-top: 48px;
            font-size: 12px;
            opacity: 0.3;
        }
    </style>

    <script>
        // Try to open the app via custom URL scheme
        (function() {
            var path = window.location.pathname; // e.g., /spot/61 or /forecast/123
            var appUrl = 'wavecheck:/' + path;

            // Attempt to open the app
            var timeout = setTimeout(function() {
                // App didn't open — user stays on this page
            }, 1500);

            window.addEventListener('blur', function() {
                clearTimeout(timeout);
            });

            // Try opening the app
            window.location.href = appUrl;
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">Wavecheck</div>
        <div class="tagline">Surf Forecasts & Session Tracking</div>

        <div class="wave-icon">🌊</div>

        <div class="message">Open in WaveCheck</div>
        <div class="sub-message">
            Get real-time surf conditions, personalized forecasts, and track your sessions across 1,000+ spots.
        </div>

        <div class="store-buttons">
            <a href="https://apps.apple.com/app/wavecheck/idYOUR_APP_ID" class="store-btn store-btn-apple">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                App Store
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.wavecheck.app" class="store-btn store-btn-google">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20.5v-17c0-.59.34-1.11.84-1.35L13.69 12l-9.85 9.85c-.5-.24-.84-.76-.84-1.35zm13.81-5.38L6.05 21.34l8.49-8.49 2.27 2.27zm.91-.91L19.59 12l-1.87-2.21-2.27 2.27 2.27 2.15zM6.05 2.66l10.76 6.22-2.27 2.27-8.49-8.49z"/></svg>
                Google Play
            </a>
        </div>

        <div class="footer">© 2026 WaveCheck</div>
    </div>
</body>
</html>
